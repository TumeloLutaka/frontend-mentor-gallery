<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./styles.css" />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 100%, 70%);
      }
    </style>
  </head>
  <body>
    <main>
      <article class="profile-card">
        <img
          class="profile-card__img"
          src="./assets/images/avatar-jessica.jpeg"
          alt="Profile Image: Jessica Randall"
        />

        <h2 class="profile-card__name">Jessica Randall</h2>
        <p class="profile-card__location">London, United Kingdom</p>
        <p class="profile-card__bio">"Front-end developer and avid reader."</p>

        <nav>
          <ul class="profile-card__nav-list">
            <li class="profile-card__nav-item"><a href="#">GitHub</a></li>
            <li class="profile-card__nav-item">
              <a href="#">Frontend Mentor</a>
            </li>
            <li class="profile-card__nav-item"><a href="#">LinkedIn</a></li>
            <li class="profile-card__nav-item"><a href="#">Twitter</a></li>
            <li class="profile-card__nav-item"><a href="#">Instagram</a></li>
          </ul>
        </nav>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Tumelo Lutaka</a>.
    </footer>
  </body>
</html>
